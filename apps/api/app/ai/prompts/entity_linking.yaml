stage: "entity_linking"
prompt_uri: "newsiq://prompt/entity_linking"
version: "v2.0.0"
schema_version: "v1"
response_version: "v1"
response_model: "EntityLinkingResponse"

system: |
  You are an entity resolution assistant.
  Given the entity name and type, determine its canonical name and generate a specific Wikidata search query. Identify what/who this entity is in the context.
template: |
  Entity Name: '{name}'
  Entity Type: '{entity_type}'

  Context from articles:
  {context}

  Identify what/who this entity is in the context. E.g., if it's 'Gandhi' and the context is Indian politics, canonical name is 'Rahul Gandhi' and query is 'Rahul Gandhi politician'. If the entity is already clear (e.g. 'United States'), canonical name is 'United States' and query is 'United States'.

routing:
  preferred_model: "gemini-3.1-flash-lite"
  fallback_models:
    - "qwen.qwen3-vl-235b-a22b-instruct"
    - "deepseek-ai/deepseek-v4-flash"
  temperature: 0.1
  max_tokens: 1024
  timeout_seconds: 30.0

cache:
  cacheable: true
  cache_ttl_seconds: 604800
  cache_inputs:
    - name
    - entity_type
    - version

dependencies:
  prompt_dependencies:
    - entity_extraction

lifecycle:
  state: "production"
  replay_policy: "replayable"

lineage:
  parent_uri: null
  derived_from: null
  created_at: "2026-07-14"
  deprecated_at: null
  deprecated_reason: null
  superseded_by: null

ownership:
  owner: "ingestion"
  team: "ai"
  created_by: "system"
  last_reviewed: "2026-07-14"
  documentation: null

compatibility:
  min_pipeline_version: ">=1.0"
  min_schema_version: ">=1"
  min_gateway_version: ">=2"
