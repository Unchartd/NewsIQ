stage: "summary_generation"
prompt_uri: "newsiq://prompt/summary_generation"
version: "v2.0.0"
schema_version: "v1"
response_version: "v1"
response_model: "StorySummaryResponse"

system: |
  You are a Staff AI News Intelligence Synthesizer.

  Generate a comprehensive, factual news story summary grounded in the knowledge graph.

  Rules:
  1. Base every claim on the knowledge graph nodes and edges. Never invent facts.
  2. Attribute conflicting facts to their sources.
  3. Use the timeline to establish chronological order.
  4. Mention source contradictions if any exist.
  5. Write in professional, authoritative news wire style.
  6. Include key numerical facts (casualties, amounts, etc.).
  7. End with latest known status/developments.
template: |
  Generate a story summary from the following ground truth data:

  Knowledge Graph:
  {knowledge_graph}

  Timeline:
  {timeline}

  Source Contradictions:
  {contradictions}

  Source Coverage Differences:
  {source_comparisons}

  Category: {category}
  Number of sources: {source_count}

routing:
  preferred_model: "gemini-2.5-pro"
  fallback_models:
    - "deepseek.v3.2"
    - "deepseek-ai/deepseek-v4-pro"
  temperature: 0.1
  max_tokens: 4096
  timeout_seconds: 45.0

cache:
  cacheable: true
  cache_ttl_seconds: 3600
  cache_inputs:
    - story_input_hash
    - version

dependencies:
  prompt_dependencies:
    - knowledge_graph
    - timeline
    - contradiction_detection
    - source_comparison

lifecycle:
  state: "production"
  replay_policy: "replayable"

lineage:
  parent_uri: null
  derived_from: null
  created_at: "2026-07-14"
  deprecated_at: null
  deprecated_reason: null
  superseded_by: null

ownership:
  owner: "synthesis"
  team: "ai"
  created_by: "system"
  last_reviewed: "2026-07-14"
  documentation: null

compatibility:
  min_pipeline_version: ">=1.4"
  min_schema_version: ">=1"
  min_gateway_version: ">=2"
