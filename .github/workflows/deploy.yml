name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. v1.2.3 or sha-abc1234)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/newsiq-api

jobs:
  build:
    name: Build & Push Release Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Oracle VM
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT || 22 }}
          script: |
            set -e

            IMAGE_NAME_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="${IMAGE_NAME_LOWER}:${{ steps.tag.outputs.tag }}"
            DEPLOY_DIR=$(echo "${{ secrets.DEPLOY_DIR || '/opt/newsiq' }}" | xargs)

            echo "=== Deploying $IMAGE ==="

            # Pull new image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE"

            cd "$DEPLOY_DIR"

            echo "=== Environment Pre-flight ==="
            pwd
            ls -la .env.production

            # Self-heal: strip Windows carriage returns from .env.production
            if [ -f .env.production ]; then
              if grep -qP '\r' .env.production 2>/dev/null || file .env.production | grep -q CRLF; then
                echo "WARNING: .env.production has CRLF line endings. Converting to LF..."
                sed -i 's/\r$//' .env.production
                echo "Done. Verifying..."
                file .env.production
              fi
            else
              echo "FATAL: .env.production not found in $(pwd)!"
              exit 1
            fi

            # Show masked DB URLs for debugging
            grep -E "^DATABASE" .env.production | sed 's/:[^@]*@/:***@/g'

            # Test DNS resolution from the host itself
            echo "=== DNS Pre-check (from host) ==="
            DB_HOST=$(grep "^DATABASE_DIRECT_URL" .env.production | head -1 | sed -e 's/.*@//' -e 's/[:/].*//')
            echo "DB Host: [$DB_HOST]"
            cat /etc/resolv.conf || true
            getent hosts "$DB_HOST" 2>&1 || nslookup "$DB_HOST" 2>&1 || host "$DB_HOST" 2>&1 || echo "HOST DNS FAILED"

            # Test DNS from inside a container
            echo "=== DNS Pre-check (from container) ==="
            docker run --rm --network host --dns 8.8.8.8 "$IMAGE" \
              python3 -c "import socket; print(socket.getaddrinfo('$DB_HOST', 5432, socket.AF_INET)[:1])" 2>&1 \
              || echo "CONTAINER DNS FAILED — will retry with explicit DNS servers"

            # Run migrations against Neon before switching traffic
            echo "=== Running Alembic migrations ==="
            docker run --rm \
              --network host \
              --dns 8.8.8.8 \
              --dns 1.1.1.1 \
              --env-file .env.production \
              "$IMAGE" \
              alembic upgrade head

            # Update image tag in .env.production
            sed -i "s|IMAGE_TAG=.*|IMAGE_TAG=${{ steps.tag.outputs.tag }}|" .env.production || true

            # Restart services with new image (prod profile)
            echo "=== Restarting services ==="
            NEWSIQ_IMAGE="$IMAGE" docker compose --profile prod up -d --no-build

            # Wait for healthcheck
            echo "=== Waiting for health check ==="
            sleep 15
            for i in 1 2 3 4 5; do
              STATUS=$(curl -sf http://localhost:8000/ready | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])" 2>/dev/null || echo "error")
              echo "Health check attempt $i: $STATUS"
              if [ "$STATUS" = "ready" ]; then
                echo "=== Deployment successful ==="
                break
              fi
              if [ $i -eq 5 ]; then
                echo "=== Health check failed — initiating rollback ==="
                exit 1
              fi
              sleep 10
            done

            # Remove old images (keep last 3)
            docker image prune -f --filter "until=72h"
            echo "=== Deploy complete ==="

      - name: Tag deployment in Sentry
        if: success() && env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          npx @sentry/cli releases new ${{ steps.tag.outputs.tag }}
          npx @sentry/cli releases set-commits ${{ steps.tag.outputs.tag }} --auto
          npx @sentry/cli releases finalize ${{ steps.tag.outputs.tag }}
          npx @sentry/cli releases deploys ${{ steps.tag.outputs.tag }} new -e production
