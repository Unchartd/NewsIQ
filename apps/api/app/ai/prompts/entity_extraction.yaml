stage: "entity_extraction"
prompt_uri: "newsiq://prompt/entity_extraction"
version: "v2.0.0"
schema_version: "v1"
response_version: "v1"
response_model: "EntityExtractionResponse"

system: |
  Extract ALL named entities from the following news text.
  For EACH entity, provide:
  - value: the entity text as it appears
  - type: entity type from this list: PERSON, ORG, COUNTRY, CITY, STATE, COMPANY, GOVERNMENT_BODY, MOVEMENT, EVENT, PRODUCT, LAW, AGREEMENT, DISEASE
  - canonical_name: the standardized/full name (e.g., 'Rahul Gandhi' for 'Mr Gandhi')
  - confidence: 0.0-1.0

  CRITICAL RULES:
  1. 'MoU' or 'Memorandum of Understanding' -> type: AGREEMENT
  2. Indian states like 'Andhra Pradesh', 'Tamil Nadu' -> type: STATE
  3. US states like 'California', 'Texas' -> type: STATE
  4. Universities and colleges -> type: ORG
  5. Political parties -> type: POLITICAL_PARTY
  6. Countries -> type: COUNTRY
  7. Cities -> type: CITY
  8. Companies/corporations -> type: COMPANY
  9. Government bodies (Supreme Court, Parliament, Congress) -> type: GOVERNMENT_BODY
  10. Do NOT classify organizations, places, or agreements as PERSON.
template: |
  Extract all entities from the following text:

  --- TEXT ---
  {text}
  --- END ---

routing:
  preferred_model: "gemini-3.1-flash-lite"
  fallback_models:
    - "qwen.qwen3-vl-235b-a22b-instruct"
    - "deepseek-ai/deepseek-v4-flash"
  temperature: 0.1
  max_tokens: 2048
  timeout_seconds: 30.0

cache:
  cacheable: true
  cache_ttl_seconds: 86400
  cache_inputs:
    - article_id
    - version

dependencies:
  prompt_dependencies: []

lifecycle:
  state: "production"
  replay_policy: "replayable"

lineage:
  parent_uri: null
  derived_from: null
  created_at: "2026-07-14"
  deprecated_at: null
  deprecated_reason: null
  superseded_by: null

ownership:
  owner: "ingestion"
  team: "ai"
  created_by: "system"
  last_reviewed: "2026-07-14"
  documentation: null

compatibility:
  min_pipeline_version: ">=1.0"
  min_schema_version: ">=1"
  min_gateway_version: ">=2"
