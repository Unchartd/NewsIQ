name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. v1.2.3 or sha-abc1234)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

# ──────────────────────────────────────────────────────────────────────────────
# Multi-platform build strategy
#
# Each image is built in a matrix across two native runners:
#   - ubuntu-latest        → linux/amd64  (standard x86-64 GitHub runner)
#   - ubuntu-24.04-arm     → linux/arm64  (native ARM64 GitHub runner)
#
# This avoids QEMU emulation which can increase Python/Next.js build times
# by 5–10× for ARM64. Native runners build each platform concurrently.
#
# After both arches complete, a "merge-manifest" job creates a single OCI
# multi-arch manifest via `docker buildx imagetools create`, making the
# image pullable on both amd64 and ARM64 hosts transparently.
#
# Cache strategy: each platform uses a scoped GHA cache key to prevent
# cross-architecture cache collisions.
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Resolve tag and lowercase image paths once — shared across all build jobs
  # ────────────────────────────────────────────────────────────────────────────
  resolve-tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      api_image: ${{ steps.images.outputs.api }}
      web_image: ${{ steps.images.outputs.web }}
      admin_image: ${{ steps.images.outputs.admin }}
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi
      - name: Lowercase image names
        id: images
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "api=ghcr.io/${REPO_LOWER}/newsiq-api" >> $GITHUB_OUTPUT
          echo "web=ghcr.io/${REPO_LOWER}/newsiq-web" >> $GITHUB_OUTPUT
          echo "admin=ghcr.io/${REPO_LOWER}/newsiq-admin" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────────────────────────────────
  # API image — build per platform natively, push platform-specific digest
  # ────────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build API (${{ matrix.platform }})
    needs: resolve-tag
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: api-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: api-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform digest (API)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          # Push as a platform-specific digest tag (no manifest list yet).
          # The merge-manifest job will combine both digests into one tag.
          tags: ${{ needs.resolve-tag.outputs.api_image }}:${{ needs.resolve-tag.outputs.tag }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          platforms: ${{ matrix.platform }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # API manifest merge — combine amd64 + arm64 digests into a single tag
  # ────────────────────────────────────────────────────────────────────────────
  merge-api:
    name: Merge API manifest
    needs: [resolve-tag, build-api]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest (API)
        env:
          IMAGE: ${{ needs.resolve-tag.outputs.api_image }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

      - name: Inspect merged manifest
        env:
          IMAGE: ${{ needs.resolve-tag.outputs.api_image }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${TAG}"

  # ────────────────────────────────────────────────────────────────────────────
  # Web (Next.js) image — build per platform natively
  # ────────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web (${{ matrix.platform }})
    needs: resolve-tag
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: web-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: web-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform digest (Web)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.newsiq.online/api/v1
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            NEXT_PUBLIC_POSTHOG_TOKEN=${{ secrets.NEXT_PUBLIC_POSTHOG_TOKEN }}
            NEXT_PUBLIC_ANALYTICS_DEBUG=false
          tags: ${{ needs.resolve-tag.outputs.web_image }}:${{ needs.resolve-tag.outputs.tag }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          platforms: ${{ matrix.platform }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max

  merge-web:
    name: Merge Web manifest
    needs: [resolve-tag, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest (Web)
        env:
          IMAGE: ${{ needs.resolve-tag.outputs.web_image }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

      - name: Inspect merged manifest
        env:
          IMAGE: ${{ needs.resolve-tag.outputs.web_image }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${TAG}"

  # ────────────────────────────────────────────────────────────────────────────
  # Admin Dashboard image — build per platform natively
  # ────────────────────────────────────────────────────────────────────────────
  build-admin:
    name: Build Admin (${{ matrix.platform }})
    needs: resolve-tag
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: admin-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: admin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform digest (Admin)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/admin
          file: ./apps/admin/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://admin-api.newsiq.online/api/v1
          tags: ${{ needs.resolve-tag.outputs.admin_image }}:${{ needs.resolve-tag.outputs.tag }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          platforms: ${{ matrix.platform }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max

  merge-admin:
    name: Merge Admin manifest
    needs: [resolve-tag, build-admin]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest (Admin)
        env:
          IMAGE: ${{ needs.resolve-tag.outputs.admin_image }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

      - name: Inspect merged manifest
        env:
          IMAGE: ${{ needs.resolve-tag.outputs.admin_image }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${TAG}"

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy — runs after all three multi-arch manifests are published
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Oracle VM
    needs: [resolve-tag, merge-api, merge-web, merge-admin]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy docker-compose.yml and Caddyfile to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT || 22 }}
          source: "docker-compose.yml,Caddyfile"
          target: ${{ secrets.DEPLOY_DIR || '/opt/newsiq' }}

      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT || 22 }}
          script: |
            set -e

            IMAGE="${{ needs.resolve-tag.outputs.api_image }}:${{ needs.resolve-tag.outputs.tag }}"
            WEB_IMAGE="${{ needs.resolve-tag.outputs.web_image }}:${{ needs.resolve-tag.outputs.tag }}"
            ADMIN_IMAGE="${{ needs.resolve-tag.outputs.admin_image }}:${{ needs.resolve-tag.outputs.tag }}"

            DEPLOY_DIR=$(echo "${{ secrets.DEPLOY_DIR || '/opt/newsiq' }}" | xargs)

            echo "=== Deploying API: $IMAGE ==="
            echo "=== Deploying WEB: $WEB_IMAGE ==="
            echo "=== Deploying ADMIN: $ADMIN_IMAGE ==="

            # Pull new images (Docker auto-selects the correct arch from the multi-arch manifest)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE"
            docker pull "$WEB_IMAGE"
            docker pull "$ADMIN_IMAGE"

            cd "$DEPLOY_DIR"

            echo "=== Environment Pre-flight ==="
            pwd
            ls -la

            # Self-heal: strip Windows carriage returns from .env.production
            if [ -f .env.production ]; then
              if grep -qP '\r' .env.production 2>/dev/null || file .env.production | grep -q CRLF; then
                echo "WARNING: .env.production has CRLF line endings. Converting to LF..."
                sed -i 's/\r$//' .env.production
              fi

              # Self-heal truncated variables (due to copy-pasting from a 102-column terminal display in nano)
              if grep -q "ap-southeas[>]" .env.production; then
                echo "WARNING: Detected truncated Neon database URL with truncation character. Self-healing..."
                sed -i 's|ap-southeas[>]|ap-southeast-1.aws.neon.tech/neondb?sslmode=require\&channel_binding=require|g' .env.production
              fi
              if grep -q "ingest.us.sentry.io/4511625657581[>]" .env.production; then
                echo "WARNING: Detected truncated Sentry DSN with truncation character. Self-healing..."
                sed -i 's|ingest.us.sentry.io/4511625657581[>]|ingest.us.sentry.io/4511625657581568|g' .env.production
              fi
              # Always enforce local Redis — Redis runs as a Docker service on the VM (no Upstash)
              echo "INFO: Enforcing local Redis URLs (redis service on Docker Compose network)..."
              sed -i 's|^REDIS_URL=.*|REDIS_URL=redis://redis:6379/0|g' .env.production
              sed -i 's|^CELERY_BROKER_URL=.*|CELERY_BROKER_URL=redis://redis:6379/1|g' .env.production
              sed -i 's|^CELERY_RESULT_BACKEND=.*|CELERY_RESULT_BACKEND=redis://redis:6379/2|g' .env.production

              # Always enforce gemini-embedding-001 for EMBEDDING_MODEL to prevent quota failures
              echo "INFO: Enforcing gemini-embedding-001 for EMBEDDING_MODEL..."
              sed -i 's|^EMBEDDING_MODEL=.*|EMBEDDING_MODEL=gemini-embedding-001|g' .env.production
            else
              echo "FATAL: .env.production not found in $(pwd)!"
              exit 1
            fi

            # ── Fix DNS on Oracle Cloud VM ────────────────────────────────
            # Oracle Cloud VMs use systemd-resolved with a stub resolver that
            # often cannot resolve external hostnames (e.g. Neon database).
            # Add Google + Cloudflare DNS as fallback resolvers.
            echo "=== Configuring DNS resolvers ==="
            sudo mkdir -p /etc/systemd/resolved.conf.d
            echo "[Resolve]" | sudo tee /etc/systemd/resolved.conf.d/dns_servers.conf
            echo "DNS=8.8.8.8 1.1.1.1 8.8.4.4" | sudo tee -a /etc/systemd/resolved.conf.d/dns_servers.conf
            echo "FallbackDNS=1.0.0.1" | sudo tee -a /etc/systemd/resolved.conf.d/dns_servers.conf
            sudo systemctl restart systemd-resolved || true
            sleep 2

            # Stop firewalld to prevent it from blocking DNS and internet routing for custom Docker bridge networks.
            # Security on OCI VMs is managed via Security Lists/NSGs at the cloud level.
            sudo systemctl stop firewalld || true
            sudo systemctl disable firewalld || true

            # Also configure Docker daemon to use public DNS
            if [ ! -f /etc/docker/daemon.json ] || ! grep -q '"dns"' /etc/docker/daemon.json 2>/dev/null; then
              echo '{"dns": ["8.8.8.8", "1.1.1.1"]}' | sudo tee /etc/docker/daemon.json
              sudo systemctl restart docker
              sleep 3
            fi

            # Verify DNS works now
            DB_HOST=$(grep "^DATABASE_DIRECT_URL" .env.production | head -1 | sed -e 's/.*@//' -e 's/[:/].*//')
            echo "DB Host: [$DB_HOST]"
            getent hosts "$DB_HOST" && echo "DNS OK" || { echo "FATAL: DNS still broken after fix"; exit 1; }

            # Show masked DB URLs for debugging
            grep -E "^DATABASE" .env.production | sed 's/:[^@]*@/:***@/g'
            grep -E "(REDIS_URL|CELERY_BROKER_URL|CELERY_RESULT_BACKEND)" .env.production | sed 's/:[^@]*@/:***@/g'

            # Run migrations against Neon before switching traffic
            # Use default bridge network (NOT --network host) so --dns flags are respected
            echo "=== Running Alembic migrations ==="
            docker run --rm \
              --dns 8.8.8.8 \
              --dns 1.1.1.1 \
              --env-file .env.production \
              "$IMAGE" \
              alembic upgrade head

            # Update image tag in .env.production
            sed -i "s|IMAGE_TAG=.*|IMAGE_TAG=${{ needs.resolve-tag.outputs.tag }}|" .env.production || true

            # Restart services with new image (prod profile)
            # Docker pull already fetched the correct arch — compose up --no-build uses it
            echo "=== Restarting services ==="
            NEWSIQ_IMAGE="$IMAGE" NEWSIQ_WEB_IMAGE="$WEB_IMAGE" NEWSIQ_ADMIN_IMAGE="$ADMIN_IMAGE" docker compose --env-file .env.production --profile prod up -d --no-build

            sleep 5
            echo "=== Container Status ==="
            docker compose --env-file .env.production --profile prod ps
            echo "=== Celery Worker Logs ==="
            docker compose --env-file .env.production --profile prod logs celery-worker --no-color --tail=100

            # Wait for Meilisearch to be healthy
            echo "=== Waiting for Meilisearch (http://localhost:7700/health) ==="
            for i in $(seq 1 24); do
              if curl -sf http://localhost:7700/health > /dev/null 2>&1; then
                echo "Meilisearch is responding (attempt $i)"
                break
              fi
              echo "Meilisearch not up yet (attempt $i/24) — sleeping 5s"
              sleep 5
              if [ $i -eq 24 ]; then
                echo "FATAL: Meilisearch did not become available"
                docker compose --env-file .env.production --profile prod ps
                docker compose --env-file .env.production --profile prod logs meilisearch --no-color --tail=200
                exit 1
              fi
            done

            # Wait for the app to be ready
            echo "=== Waiting for app readiness (http://localhost:8000/ready) ==="
            for i in $(seq 1 30); do
              STATUS=$(curl -sf http://localhost:8000/ready 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo "error")
              echo "Health check attempt $i: $STATUS"
              if [ "$STATUS" = "ready" ]; then
                echo "=== Deployment successful ==="
                break
              fi
              if [ $i -eq 30 ]; then
                echo "=== Health check failed — initiating rollback ==="
                echo "=== Container Status ==="
                docker compose --env-file .env.production --profile prod ps
                echo "=== App logs (last 500 lines) ==="
                docker compose --env-file .env.production --profile prod logs user-api --no-color --tail=500 || true
                echo "=== Meilisearch logs (last 500 lines) ==="
                docker compose --env-file .env.production --profile prod logs meilisearch --no-color --tail=500 || true
                exit 1
              fi
              sleep 5
            done

            # Remove old images (keep last 3)
            docker image prune -f --filter "until=72h"
            echo "=== Deploy complete ==="

      - name: Tag deployment in Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        if: success() && env.SENTRY_AUTH_TOKEN != ''
        run: |
          npx @sentry/cli releases new ${{ needs.resolve-tag.outputs.tag }}
          npx @sentry/cli releases set-commits ${{ needs.resolve-tag.outputs.tag }} --auto
          npx @sentry/cli releases finalize ${{ needs.resolve-tag.outputs.tag }}
          npx @sentry/cli releases deploys ${{ needs.resolve-tag.outputs.tag }} new -e production
