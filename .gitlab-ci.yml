# NewsIQ CI/CD pipeline
stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ───────────────────────────────────────────────
# Backend (FastAPI / Python)
# ───────────────────────────────────────────────
backend-lint:
  stage: lint
  image: python:3.12-slim
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
  before_script:
    - cd apps/api
    - pip install ruff
  script:
    - ruff check .
    - ruff format --check .
  rules:
    - changes:
        - apps/api/**/*

backend-test:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:17-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_USER: newsiq
    POSTGRES_PASSWORD: newsiq
    POSTGRES_DB: newsiq_test
    DATABASE_URL: "postgresql+asyncpg://newsiq:newsiq@postgres:5432/newsiq_test"
    REDIS_URL: "redis://redis:6379/0"
    DEBUG: "true"
    SECRET_KEY: "test-secret-key-not-for-production"
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
  before_script:
    - cd apps/api
    - apt-get update && apt-get install -y --no-install-recommends gcc
    - pip install -e . || pip install -r requirements.txt || true
    - pip install pytest pytest-asyncio httpx
  script:
    - pytest -v
  rules:
    - changes:
        - apps/api/**/*

# ───────────────────────────────────────────────
# Frontend (Next.js / TypeScript)
# ───────────────────────────────────────────────
frontend-lint:
  stage: lint
  image: node:20-alpine
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - apps/web/node_modules
  before_script:
    - cd apps/web
    - npm ci
  script:
    - npm run lint
  rules:
    - changes:
        - apps/web/**/*

frontend-build:
  stage: build
  image: node:20-alpine
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - apps/web/node_modules
  before_script:
    - cd apps/web
    - npm ci
  script:
    - npm run build
  rules:
    - changes:
        - apps/web/**/*
