stage: "contradiction_detection"
prompt_uri: "newsiq://prompt/contradiction_detection"
version: "v2.0.0"
schema_version: "v1"
response_version: "v1"
response_model: "ContradictionResponse"

system: |
  You are a factual contradiction validator for a news intelligence platform.

  Your task is to determine if two conflicting reports represent a TRUE factual contradiction.

  Rules:
  1. Wording differences, translation variations, or subset relationships (e.g., '15 police officers' vs '15 people' or '15 dead' vs 'at least 10 dead') are NOT contradictions.
  2. Only flag TRUE contradictions: Source A says Russia did it, Source B says Ukraine did it; or 15 dead vs 50 dead; or 2 PM vs 3 PM.
  3. Be conservative. When in doubt, it is NOT a contradiction.
template: |
  Compare these two conflicting reports of the same '{fact_type}' detail:
  1. Source: {source1_name} reports: {val1}
  2. Source: {source2_name} reports: {val2}

  Context from the articles:
  {context}

  Determine if this is a true factual contradiction.

routing:
  preferred_model: "gemini-2.5-flash"
  fallback_models:
    - "qwen.qwen3-vl-235b-a22b-instruct"
    - "deepseek-ai/deepseek-v4-flash"
  temperature: 0.1
  max_tokens: 1024
  timeout_seconds: 30.0

cache:
  cacheable: true
  cache_ttl_seconds: 3600
  cache_inputs:
    - story_input_hash
    - version

dependencies:
  prompt_dependencies:
    - event_extraction

lifecycle:
  state: "production"
  replay_policy: "replayable"

lineage:
  parent_uri: null
  derived_from: null
  created_at: "2026-07-14"
  deprecated_at: null
  deprecated_reason: null
  superseded_by: null

ownership:
  owner: "synthesis"
  team: "ai"
  created_by: "system"
  last_reviewed: "2026-07-14"
  documentation: null

compatibility:
  min_pipeline_version: ">=1.4"
  min_schema_version: ">=1"
  min_gateway_version: ">=2"
