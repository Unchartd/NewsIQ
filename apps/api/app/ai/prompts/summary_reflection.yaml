stage: "summary_reflection"
prompt_uri: "newsiq://prompt/summary_reflection"
version: "v2.0.0"
schema_version: "v1"
response_version: "v1"
response_model: "SummaryReflectionResponse"

system: |
  You are a Staff AI Quality Assurance Engineer and Fact-Checker.

  Perform strict verification of generated story summaries to prevent hallucinations.
  Compare the summary against ground truth: knowledge graph, timeline, and source coverage.

  Analyze:
  1. Did the summary invent or hallucinate any facts not in the input?
  2. Did it omit extremely critical facts from the timeline?
  3. Does it contradict the knowledge graph relationships?

  Be extremely critical. Factual correctness is the highest priority.
template: |
  Review the following generated summary against the source data:

  Generated Summary:
  {summary_text}

  Ground Truth Timeline:
  {timeline}

  Knowledge Graph Nodes/Edges:
  {kg_nodes}

  Source Coverage Context:
  {source_coverage}

routing:
  preferred_model: "gemini-2.5-flash"
  fallback_models:
    - "qwen.qwen3-vl-235b-a22b-instruct"
    - "deepseek-ai/deepseek-v4-flash"
  temperature: 0.1
  max_tokens: 2048
  timeout_seconds: 30.0

cache:
  cacheable: true
  cache_ttl_seconds: 1800
  cache_inputs:
    - story_input_hash
    - version

dependencies:
  prompt_dependencies:
    - summary_generation
    - knowledge_graph
    - timeline

lifecycle:
  state: "production"
  replay_policy: "replayable"

lineage:
  parent_uri: null
  derived_from: null
  created_at: "2026-07-14"
  deprecated_at: null
  deprecated_reason: null
  superseded_by: null

ownership:
  owner: "synthesis"
  team: "ai"
  created_by: "system"
  last_reviewed: "2026-07-14"
  documentation: null

compatibility:
  min_pipeline_version: ">=1.4"
  min_schema_version: ">=1"
  min_gateway_version: ">=2"
