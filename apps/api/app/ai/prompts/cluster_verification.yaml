stage: "cluster_verification"
prompt_uri: "newsiq://prompt/cluster_verification"
version: "v2.0.0"
schema_version: "v1"
response_version: "v1"
response_model: "ClusterVerificationResponse"

system: |
  You are a Staff Search and News Intelligence Engineer specializing in event validation.

  Your mission is to prevent false positive merges in news clustering. False positive merges are catastrophic.

  Rules:
  1. If they describe different occurrences (e.g., two separate strikes on the same city on different days), return same_event = False.
  2. If there is a core conflict in actors, targets, location, or event time, return same_event = False.
  3. If they describe the same event from different perspectives, return same_event = True.
  4. Be extremely precise and conservative.
template: |
  Compare these two articles and decide if they describe the exact same event:

  Article A:
  - Title: {article_a_title}
  - Extracted Event: {article_a_event}

  Article B:
  - Title: {article_b_title}
  - Extracted Event: {article_b_event}

  Similarity Score: {similarity_score:.4f}
  Knowledge Graph Context: {kg_nodes}

  Determine if they represent the same event.

routing:
  preferred_model: "gemini-3.1-flash-lite"
  fallback_models:
    - "qwen.qwen3-vl-235b-a22b-instruct"
    - "deepseek-ai/deepseek-v4-flash"
  temperature: 0.1
  max_tokens: 512
  timeout_seconds: 30.0

cache:
  cacheable: true
  cache_ttl_seconds: 3600
  cache_inputs:
    - story_input_hash
    - version

dependencies:
  prompt_dependencies:
    - event_extraction

lifecycle:
  state: "production"
  replay_policy: "replayable"

lineage:
  parent_uri: null
  derived_from: null
  created_at: "2026-07-14"
  deprecated_at: null
  deprecated_reason: null
  superseded_by: null

ownership:
  owner: "clustering"
  team: "ai"
  created_by: "system"
  last_reviewed: "2026-07-14"
  documentation: null

compatibility:
  min_pipeline_version: ">=1.0"
  min_schema_version: ">=1"
  min_gateway_version: ">=2"
