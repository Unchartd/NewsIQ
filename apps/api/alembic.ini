[alembic]
script_location = alembic
# sqlalchemy.url is NOT set here — it is injected dynamically at runtime
# by alembic/env.py from the DATABASE_DIRECT_URL (or DATABASE_URL) setting.
# This ensures migrations always target the correct environment without
# hardcoded credentials in source control.
sqlalchemy.url = driver://not-set-here

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
