
services:
  # ──────────────────────────────────────────────
  # Infrastructure Services
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: newsiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsiq
      POSTGRES_PASSWORD: newsiq
      POSTGRES_DB: newsiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: newsiq-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@newsiq.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: newsiq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: newsiq-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: newsiq-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: newsiq-dev-key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Application Services
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: newsiq-api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - prometheus_multiproc:/tmp/prometheus_multiproc
    environment:
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=postgresql+asyncpg://newsiq:newsiq@postgres:5432/newsiq
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_API_KEY=newsiq-dev-key
      - SECRET_KEY=change-me-in-production-use-openssl-rand-hex-32
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_API_KEY_EMBEDDING=${GEMINI_API_KEY_EMBEDDING:-}
      - GEMINI_API_KEY_SYNTH=${GEMINI_API_KEY_SYNTH:-}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - GNEWS_API_KEY=${GNEWS_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-001}
      - SUMMARIZATION_MODEL=${SUMMARIZATION_MODEL:-gemini-2.5-flash}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    # ── Docker Watch ──────────────────────────────────────────────
    # uvicorn --reload handles Python file changes automatically.
    # pyproject.toml changes require a full rebuild (new deps).
    develop:
      watch:
        - action: sync
          path: ./apps/api/app
          target: /app/app
          ignore:
            - __pycache__/
            - "**/*.pyc"
            - "**/*.pyo"
        - action: sync
          path: ./apps/api/alembic
          target: /app/alembic
        - action: rebuild
          path: ./apps/api/pyproject.toml

  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: newsiq-celery-worker
    volumes:
      - ./apps/api:/app
      - prometheus_multiproc:/tmp/prometheus_multiproc
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=postgresql+asyncpg://newsiq:newsiq@postgres:5432/newsiq
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_API_KEY=newsiq-dev-key
      - SECRET_KEY=change-me-in-production-use-openssl-rand-hex-32
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_API_KEY_EMBEDDING=${GEMINI_API_KEY_EMBEDDING:-}
      - GEMINI_API_KEY_SYNTH=${GEMINI_API_KEY_SYNTH:-}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - GNEWS_API_KEY=${GNEWS_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-001}
      - SUMMARIZATION_MODEL=${SUMMARIZATION_MODEL:-gemini-2.5-flash}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ── Docker Watch ──────────────────────────────────────────────
    # Celery doesn't auto-reload — sync source then restart the worker.
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api/app
          target: /app/app
          ignore:
            - __pycache__/
            - "**/*.pyc"
            - "**/*.pyo"
        - action: rebuild
          path: ./apps/api/pyproject.toml

  celery_beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: newsiq-celery-beat
    volumes:
      - ./apps/api:/app
      - prometheus_multiproc:/tmp/prometheus_multiproc
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-true}
      - DATABASE_URL=postgresql+asyncpg://newsiq:newsiq@postgres:5432/newsiq
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_API_KEY=newsiq-dev-key
      - SECRET_KEY=change-me-in-production-use-openssl-rand-hex-32
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_API_KEY_EMBEDDING=${GEMINI_API_KEY_EMBEDDING:-}
      - GEMINI_API_KEY_SYNTH=${GEMINI_API_KEY_SYNTH:-}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - GNEWS_API_KEY=${GNEWS_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-001}
      - SUMMARIZATION_MODEL=${SUMMARIZATION_MODEL:-gemini-2.5-flash}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ── Docker Watch ──────────────────────────────────────────────
    # Beat scheduler needs a restart to pick up task schedule changes.
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api/app
          target: /app/app
          ignore:
            - __pycache__/
            - "**/*.pyc"
            - "**/*.pyo"
        - action: rebuild
          path: ./apps/api/pyproject.toml

  web:
    build:
      context: ./apps/web
      # Dockerfile.dev runs "next dev" for HMR — use Dockerfile for production
      dockerfile: Dockerfile.dev
    container_name: newsiq-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - INTERNAL_API_URL=http://api:8000/api/v1
      - WATCHPACK_POLLING=true   # needed on Windows/WSL2 for inotify to work
    depends_on:
      - api
    # ── Docker Watch ──────────────────────────────────────────────
    # Source files: sync directly — Next.js HMR picks them up instantly.
    # package.json / lock file: rebuild so node_modules stays current.
    # next.config.*: restart to apply config changes.
    develop:
      watch:
        - action: sync
          path: ./apps/web/src
          target: /app/src
        - action: sync
          path: ./apps/web/public
          target: /app/public
        - action: rebuild
          path: ./apps/web/package.json
        - action: rebuild
          path: ./apps/web/package-lock.json
        - action: sync+restart
          path: ./apps/web/next.config.ts
          target: /app/next.config.ts
        - action: sync+restart
          path: ./apps/web/tailwind.config.ts
          target: /app/tailwind.config.ts

  flower:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: newsiq-flower
    volumes:
      - ./apps/api:/app
    command: celery -A app.workers.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis

  langfuse-db:
    image: postgres:17-alpine
    container_name: newsiq-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  langfuse:
    image: langfuse/langfuse:2
    container_name: newsiq-langfuse
    restart: unless-stopped
    depends_on:
      - langfuse-db
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=my-secret-key-1234
      - NEXTAUTH_URL=http://localhost:3100
      - TELEMETRY_ENABLED=false
      - ENCRYPTION_KEY=7ead3dd24cd258cddee5056b3986ffa56717a188f65fad9997b6ddf1764d1573
      - SALT=ea8cca740f3bf60376c887b5af8696d9c94e3879c042fd4c2969d1b2add62339

  prometheus:
    image: prom/prometheus:latest
    container_name: newsiq-prometheus
    restart: unless-stopped
    volumes:
      - ./apps/api/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: newsiq-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  # ──────────────────────────────────────────────
  # Standalone Admin Dashboard
  # ──────────────────────────────────────────────
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: newsiq-admin
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_APP_NAME=NewsIQ Admin
    depends_on:
      - api
    profiles:
      - admin

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  meilisearch_data:
  langfuse_db_data:
  grafana_data:
  prometheus_multiproc:
