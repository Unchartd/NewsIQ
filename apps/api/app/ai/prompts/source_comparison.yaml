stage: "source_comparison"
prompt_uri: "newsiq://prompt/source_comparison"
version: "v2.0.0"
schema_version: "v1"
response_version: "v1"
response_model: "SourceComparisonResponse"

system: |
  You are a professional news intelligence analyst.

  Analyze a publisher's coverage of a story and generate a structured comparison.

  For 'focus_area': write a concise, professional sentence (max 100 chars) summarizing their coverage angle.
  For 'unique_information', 'missing_information', and 'contradictions': provide concise, readable descriptions. If none, return empty string.
template: |
  Analyze the coverage of publisher '{src_name}' for a story.

  Differences detected by heuristic engines:
  1. Unique facts reported only by {src_name}: {unique_summary}
  2. Facts reported by others but omitted by {src_name}: {missing_summary}
  3. Factual contradictions involving {src_name}: {contradictions_summary}

  Context from the story's articles:
  {context}

  Synthesize a clean analysis.

routing:
  preferred_model: "gemini-2.5-flash"
  fallback_models:
    - "qwen.qwen3-vl-235b-a22b-instruct"
    - "deepseek-ai/deepseek-v4-flash"
  temperature: 0.1
  max_tokens: 2048
  timeout_seconds: 30.0

cache:
  cacheable: true
  cache_ttl_seconds: 3600
  cache_inputs:
    - story_input_hash
    - version

dependencies:
  prompt_dependencies:
    - contradiction_detection

lifecycle:
  state: "production"
  replay_policy: "replayable"

lineage:
  parent_uri: null
  derived_from: null
  created_at: "2026-07-14"
  deprecated_at: null
  deprecated_reason: null
  superseded_by: null

ownership:
  owner: "synthesis"
  team: "ai"
  created_by: "system"
  last_reviewed: "2026-07-14"
  documentation: null

compatibility:
  min_pipeline_version: ">=1.4"
  min_schema_version: ">=1"
  min_gateway_version: ">=2"
